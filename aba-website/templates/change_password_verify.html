<!DOCTYPE html>
<html>
<head>
    <title>Password Change Verification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #ffffff;
        }
        .dark-container {
            width: 400px;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
        }
        h2 {
            font-size: 32px;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 18px;
            margin-bottom: 30px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            font-size: 16px;
            background-color: #000;
            color: #fff;
            border: 1px solid #333;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .error {
            color: #ff4444;
            margin-bottom: 15px;
            font-weight: bold;
        }
        button {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>

<div class="dark-container">
    <h2>Password Change</h2>
    <div class="subtitle">Card Inserted</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input type="text" name="user_id" placeholder="Enter User ID" required>
        <input type="password" name="current_password" placeholder="Enter Current Password" required>
        <button type="submit">Verify</button>
    </form>
</div>

</body>
</html>
