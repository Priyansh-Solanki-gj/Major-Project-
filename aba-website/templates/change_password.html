<!DOCTYPE html>
<html>
<head>
    <title>Password Change</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .dark-container {
            background-color: #121212;
            color: #ffffff;
            width: 400px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        h2 {
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 16px;
            margin-bottom: 10px;
        }
        .success-text {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 25px;
        }
        .success-text span {
            margin-right: 5px;
        }
        .input-group {
            margin-bottom: 25px;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background-color: #000;
            color: #fff;
            border: 1px solid #333;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input[type="password"]::placeholder {
            color: #666;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #555;
        }
        .policy {
            text-align: left;
            font-size: 14px;
            margin-bottom: 25px;
            color: #ff4444; /* Default red */
        }
        .policy-header {
            margin-bottom: 10px;
            font-weight: bold;
        }
        .policy-item {
            margin-bottom: 8px;
        }
        .policy-item span.icon {
            display: inline-block;
            width: 20px;
        }
        .btn-update {
            background-color: #444;
            color: #888;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: not-allowed;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-update.enabled {
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }
        /* State Colors */
        .valid {
            color: #4CAF50; /* Green */
        }
        .invalid {
            color: #ff4444; /* Red */
        }
    </style>
</head>
<body>

<form method="POST" action="/change-password">
<div class="dark-container">
    <h2>Password Change</h2>
    <div class="subtitle">Card Inserted</div>
    <div class="success-text"><span>✓</span> Verification Successful</div>

    <div class="input-group">
        <input type="password" name="password" id="new-password" placeholder="Enter New Password" required>
    </div>

    <div class="policy">
        <div class="policy-header invalid">Password must contain:</div>
        <div class="policy-item invalid" id="req-length"><span class="icon">✗</span>At least 10 characters</div>
        <div class="policy-item invalid" id="req-uppercase"><span class="icon">✗</span>At least one uppercase letter</div>
        <div class="policy-item invalid" id="req-lowercase"><span class="icon">✗</span>At least one lowercase letter</div>
        <div class="policy-item invalid" id="req-number"><span class="icon">✗</span>At least one number</div>
        <div class="policy-item invalid" id="req-special"><span class="icon">✗</span>At least one special character (!@#$%^&* etc.)</div>
    </div>

    <button type="submit" class="btn-update" id="btn-update" disabled>Update Password</button>
</div>
</form>

<script>
    const passwordInput = document.getElementById('new-password');
    const btnUpdate = document.getElementById('btn-update');

    const reqLength = document.getElementById('req-length');
    const reqUppercase = document.getElementById('req-uppercase');
    const reqLowercase = document.getElementById('req-lowercase');
    const reqNumber = document.getElementById('req-number');
    const reqSpecial = document.getElementById('req-special');

    // Validation Regexes
    const regUppercase = /[A-Z]/;
    const regLowercase = /[a-z]/;
    const regNumber = /[0-9]/;
    const regSpecial = /[!@#$%^&*()_+{}\[\]:;"'<>,.?~\\/-]/;

    function updateItemClass(element, isValid) {
        if (isValid) {
            element.classList.remove('invalid');
            element.classList.add('valid');
            element.querySelector('.icon').innerText = '✓';
        } else {
            element.classList.remove('valid');
            element.classList.add('invalid');
            element.querySelector('.icon').innerText = '✗';
        }
    }

    passwordInput.addEventListener('input', function() {
        const val = passwordInput.value;
        let validCount = 0;

        // Length
        const isLengthValid = val.length >= 10;
        updateItemClass(reqLength, isLengthValid);
        if (isLengthValid) validCount++;

        // Uppercase
        const isUppercaseValid = regUppercase.test(val);
        updateItemClass(reqUppercase, isUppercaseValid);
        if (isUppercaseValid) validCount++;

        // Lowercase
        const isLowercaseValid = regLowercase.test(val);
        updateItemClass(reqLowercase, isLowercaseValid);
        if (isLowercaseValid) validCount++;

        // Number
        const isNumberValid = regNumber.test(val);
        updateItemClass(reqNumber, isNumberValid);
        if (isNumberValid) validCount++;

        // Special Character
        const isSpecialValid = regSpecial.test(val);
        updateItemClass(reqSpecial, isSpecialValid);
        if (isSpecialValid) validCount++;

        // Enable or disable button
        if (validCount === 5) {
            btnUpdate.disabled = false;
            btnUpdate.classList.add('enabled');
        } else {
            btnUpdate.disabled = true;
            btnUpdate.classList.remove('enabled');
        }
    });
</script>

</body>
</html>
