<!DOCTYPE html>
<html>
<head>
    <title>Password Changed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #ffffff;
        }
        .dark-container {
            width: 450px;
            padding: 40px;
            border-radius: 8px;
            text-align: center;
        }
        h2 {
            font-size: 32px;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 18px;
            margin-bottom: 40px;
        }
        button {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>

<div class="dark-container">
    <h2>✓ Password Changed Successfully</h2>
    <div class="subtitle">Your password has been updated securely.</div>

    <form action="/login" method="GET">
        <button type="submit">Back to Login</button>
    </form>
</div>

</body>
</html>
